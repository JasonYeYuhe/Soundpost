name: CI

# Test-only CI (M12 §S1): runs the unit suite on a simulator, asserts the build
# is warning-free in our sources, and enforces String Catalog 100% translation.
# Deliberately needs NO signing and NO secrets — it never archives or uploads, so
# nothing here can leak the ASC / Sentry creds (dSYM upload stays in the local
# build-upload pipeline, gated on SENTRY_AUTH_TOKEN).
#
# Runs on macos-26 to match the local toolchain (Xcode 26 / iOS 26 SDK): the app
# uses iOS-26-SDK symbols (e.g. AVAudioSession's renamed `.allowBluetoothHFP`), so
# an older runner (macos-15 / Xcode 16) can't compile it. Deployment target stays
# iOS 17 — only the build SDK must match.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build, test & guard standing bars
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Localization gate (xcstrings 100% translated)
        run: ./scripts/check-localization.sh

      - name: Select an available iPhone simulator
        id: sim
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; ids=[v['udid'] for rt in sorted(d) for v in d[rt] if v.get('isAvailable') and v['name'].startswith('iPhone')]; print(ids[0] if ids else '')")
          if [ -z "$DEVICE_ID" ]; then echo 'No iPhone simulator available' >&2; exit 1; fi
          echo "Using simulator: $DEVICE_ID"
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"

      - name: Build & test (iOS Simulator)
        run: |
          set -o pipefail
          # Ad-hoc local signing ("-"): needs no Apple identity or provisioning
          # profile (so it works on a runner with no signing creds) yet still
          # signs the embedded Sentry framework enough to load on the simulator —
          # CODE_SIGNING_ALLOWED=NO would leave it unsigned and the host app would
          # SIGTRAP before the test bundle can attach.
          xcodebuild test \
            -project Soundpost.xcodeproj \
            -scheme Soundpost \
            -destination "platform=iOS Simulator,id=${{ steps.sim.outputs.device_id }}" \
            -resultBundlePath build/ci.xcresult \
            CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="-" \
            PROVISIONING_PROFILE_SPECIFIER="" DEVELOPMENT_TEAM="" \
            | tee build/xcodebuild.log

      - name: Warning gate (warning-free project build)
        run: ./scripts/check-warnings.sh build/xcodebuild.log

      - name: Upload result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcresult
          path: build/ci.xcresult
          retention-days: 7
          if-no-files-found: ignore
